<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      margin: 0;
      background-color: #f4f4f9;
    }
    h2 {
      color: #4630eb;
      font-size: 16px;
      margin-top: 0;
    }
    p {
      font-size: 13px;
      color: #333;
      line-height: 1.4;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      color: #28a745;
    }
    .dot {
      height: 10px;
      width: 10px;
      background-color: #28a745;
      border-radius: 50%;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h2>Snack Interceptor</h2>
  <div class="status">
    <span class="dot"></span>
    <span>Monitorando...</span>
  </div>
  <p>Abra um projeto no <b>Expo Snack</b> e clique em <b>"Save"</b>. O link de download aparecerá no console (F12) e em um alerta.</p>
</body>
</html>
